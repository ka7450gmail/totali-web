
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Totali Lamination - Final Revised</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --cyan: #00f2ff; --dark: #000000; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: #333; display: flex; justify-content: center; }
        .flyer-page {
            width: 8.5in; height: 11in;
            background: var(--dark); color: white;
            padding: 40px; box-sizing: border-box;
            display: flex; flex-direction: column;
            align-items: center; text-align: center;
        }
        /* Top Section - UNTOUCHED */
        .top-section { margin-bottom: 20px; }
        .top-section h1 { 
            font-size: 4.8rem; margin: 0; font-weight: 900; 
            line-height: 0.9; text-transform: uppercase; 
        }
        .text-cyan { color: var(--cyan); }

        .logo-img { width: 220px; height: auto; margin: 10px 0; }

        .qr-section { background: white; padding: 20px; border-radius: 20px; margin: 20px 0; }
        .qr-section img { width: 300px; height: 300px; display: block; }

        /* The New 3-Line Bottom */
        .bottom-section { margin-top: auto; width: 100%; padding-bottom: 20px; }
        .line-1 { font-size: 2.2rem; font-weight: 700; margin-bottom: 8px; }
        .line-2 { font-size: 2.6rem; font-weight: 900; color: var(--cyan); text-transform: uppercase; margin-bottom: 8px; }
        .line-3 { font-size: 2.4rem; font-weight: 900; letter-spacing: 1px; }

        @media print { .btn-print { display: none; } .flyer-page { width: 100%; height: 100vh; } }
        .btn-print { position: fixed; top: 20px; right: 20px; padding: 15px 30px; background: var(--cyan); color: black; border: none; font-weight: 900; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body>
    <button class="btn-print" onclick="window.print()">🖨️ PRINT LAMINATION</button>
    <div class="flyer-page">
        <div class="top-section">
            <h1>SCAN TO JOIN</h1>
            <h1 class="text-cyan">LONDON'S 70/30</h1>
            <h1>REVOLUTION</h1>
        </div>

        <img src="assets/images/logo.png" alt="Totali Rides" class="logo-img">

        <div class="qr-section">
            <img src="assets/images/qr-rider-app.png" alt="QR Code">
        </div>

        <div class="bottom-section">
            <div class="line-1">Stop Tipping. Start Saving.</div>
            <div class="line-2">The No Tips Rideshare Platform</div>
            <div class="line-3">WWW.TOTALIRIDES.CA</div>
        </div>
    </div>
</body>
</html>
