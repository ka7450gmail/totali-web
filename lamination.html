<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Totali Lamination - Final Version</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --brand-color: #00f2ff; --dark: #000000; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: #333; display: flex; justify-content: center; }
        .flyer-page {
            width: 8.5in; height: 11in;
            background: var(--dark); color: white;
            padding: 60px 40px; box-sizing: border-box;
            display: flex; flex-direction: column;
            align-items: center; text-align: center;
        }
        /* Top Section */
        .top-section { margin-bottom: 20px; }
        .top-section h1 { 
            font-size: 5.2rem; margin: 0; font-weight: 900; 
            line-height: 0.9; text-transform: uppercase; 
        }
        .text-brand { color: var(--brand-color); }

        /* QR Section - Clean & High */
        .qr-section { background: white; padding: 25px; border-radius: 20px; margin: 40px 0; }
        .qr-section img { width: 360px; height: 360px; display: block; }

        /* Bottom Section - Exact Wording & Colors */
        .bottom-section { margin-top: auto; width: 100%; padding-bottom: 40px; text-transform: uppercase; }
        
        /* Line 1: White / Cyan */
        .line-1 { font-size: 3rem; font-weight: 900; margin-bottom: 15px; }
        
        /* Line 2: Cyan / White */
        .line-2 { font-size: 3.2rem; font-weight: 900; margin-bottom: 25px; }
        
        /* Line 3: White & Smaller */
        .line-3 { font-size: 2.2rem; font-weight: 900; letter-spacing: 2px; }

        @media print { .btn-print { display: none; } .flyer-page { width: 100%; height: 100vh; } }
        .btn-print { position: fixed; top: 20px; right: 20px; padding: 15px 30px; background: var(--brand-color); color: black; border: none; font-weight: 900; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body>
    <button class="btn-print" onclick="window.print()">🖨️ PRINT LAMINATION</button>
    <div class="flyer-page">
        <div class="top-section">
            <h1>SCAN TO JOIN</h1>
            <h1 class="text-brand">LONDON'S 70/30</h1>
            <h1>REVOLUTION</h1>
        </div>

        <div class="qr-section">
            <img src="assets/images/qr-rider-app.png" alt="QR Code">
        </div>

        <div class="bottom-section">
            <!-- Line 1: White STOP TIPPING, Cyan START SAVING -->
            <div class="line-1">STOP TIPPING, <span class="text-brand">START SAVING.</span></div>
            
            <!-- Line 2: Cyan THE NO TIPS, White RIDESHARE -->
            <div class="line-2"><span class="text-brand">THE NO TIPS</span> RIDESHARE</div>
            
            <!-- Line 3: White WWW.TOTALIRIDES.CA -->
            <div class="line-3">WWW.TOTALIRIDES.CA</div>
        </div>
    </div>
</body>
</html>
